<!DOCTYPE html>
<html>
 <head>
 <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>   </title>
  <style> 
  body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { padding: 8px; margin-right: 5px; }
        button { padding: 8px 15px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        #resultado { margin-top: 15px; font-weight: bold; color: #333; }
</style>
 
 </head>
 <body>
 <div class="card">
 <h1> para ou impar</h1>
 <label> Coloque um número inteiro</label>
 <input type="number" id="valor" placeholder="0">
 <p id="resultado"> </p>
 <button onclick="verificar()">verificar</button>
 </div>
 <script>
  function verificar(){
  let valor= document.getElementById("valor").value;
  let resultado= document.getElementById("resultado");
  if (valor%2===0){
  resultado.innerHTML=` O valor ${valor} e um número par`;
  }
  else { 
  resultado.innerHTML= `O valor ${valor} é um número impar`;
  }
  

}

 </script>
 
 
 </body>

</html>
