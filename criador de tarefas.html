<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CRUD JSON LocalStorage</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 20px auto; }
        .item { display: flex; justify-content: space-between; margin-bottom: 5px; border-bottom: 1px solid #eee; padding: 5px; }
        button { cursor: pointer; }
    </style>
</head>
<body>

    <h2>Minhas Tarefas</h2>
    <input type="text" id="taskInput" placeholder="Nova tarefa...">
    <button onclick="createTask()">Adicionar</button>

    <div id="taskList" style="margin-top: 20px;"></div>

    <script>
        // --- LOGICA DO CRUD ---

        // 1. READ (Ler)
        function getTasks() {
            const data = localStorage.getItem('tasks');
            // Se existir dados, transforma de JSON para Objeto. Se não, retorna array vazio.
            return data ? JSON.parse(data) : [];
        }

        // 2. CREATE (Criar)
        function createTask() {
            const input = document.getElementById('taskInput');
            if (!input.value) return;

            const tasks = getTasks();
            tasks.push(input.value); // Adiciona ao array
            
            // Salva de volta no LocalStorage convertendo para JSON
            localStorage.setItem('tasks', JSON.stringify(tasks));
            
            input.value = '';
            render();
        }

        // 3. DELETE (Deletar)
        function deleteTask(index) {
            const tasks = getTasks();
            tasks.splice(index, 1); // Remove o item pelo índice
            localStorage.setItem('tasks', JSON.stringify(tasks));
            render();
        }

        // 4. UPDATE (Atualizar - Simplificado)
        function updateTask(index) {
            const tasks = getTasks();
            const novoTexto = prompt("Editar tarefa:", tasks[index]);
            if (novoTexto) {
                tasks[index] = novoTexto;
                localStorage.setItem('tasks', JSON.stringify(tasks));
                render();
            }
        }

        // Função para mostrar na tela
        function render() {
            const list = document.getElementById('taskList');
            const tasks = getTasks();
            list.innerHTML = tasks.map((task, index) => `
                <div class="item">
                    <span>${task}</span>
                    <div>
                        <button onclick="updateTask(${index})">✎</button>
                        <button onclick="deleteTask(${index})">X</button>
                    </div>
                </div>
            `).join('');
        }

        // Renderiza ao abrir a página
        render();
    </script>
</body>
</html>
